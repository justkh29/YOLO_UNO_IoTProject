<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Mode</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="config-page">
    <div class="container">
        <h1>AP Mode</h1>
        <p class="subtitle">Connect to Internet</p>

        <button class="btn btn-primary" id="scanBtn" onclick="scanWiFi()">Scan Networks</button>

        <form onsubmit="saveWiFi(event)" class="config-form">
            <select id="ssid" required>
                <option value="">Select Network...</option>
            </select>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" class="btn btn-success" id="saveBtn">Save & Connect</button>
        </form>

        <div class="alert alert-success" id="successMsg" style="display: none;">
            Saved! Restarting...
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
